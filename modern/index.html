<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <title>ASPDotNetStorefront 10 Manual</title>
  <link rel="icon" href="../images/favicon.ico">

</head>
<body>
  <a class="skip-link" href="#articleBody">Skip to article</a>

  <header class="site-header">
    <div class="site-title">
      <a href="#page=welcome.htm">ASPDotNetStorefront Manual</a>
      <span>Version 10.0.0–10.0.26</span>
    </div>
    <div class="header-tools" aria-label="Reader controls">
      <button id="decreaseText" type="button" title="Decrease text size">A−</button>
      <button id="increaseText" type="button" title="Increase text size">A+</button>
      <button id="printButton" type="button">Print</button>
      <a id="originalLink" href="../welcome.htm" target="_blank" rel="noopener">Open original page</a>
    </div>
  </header>

  <div class="page-layout">
    <aside class="contents-panel" aria-label="Manual contents">
      <div class="contents-heading">
        <h1>Contents</h1>
        <p id="topicCount"></p>
      </div>

      <div class="search-area">
        <label for="navSearch">Find a topic</label>
        <div class="search-row">
          <input id="navSearch" type="search" placeholder="Search topic names" autocomplete="off" spellcheck="false">
          <button id="clearSearch" type="button">Clear</button>
        </div>
        <p class="search-help">Search results appear below. The complete contents list always remains visible.</p>
      </div>

      <section id="searchResultsSection" class="search-results" hidden>
        <h2>Search results</h2>
        <p id="searchStatus" aria-live="polite"></p>
        <ol id="searchResultsList"></ol>
      </section>

      <nav id="manualTree" class="manual-tree" aria-label="Complete table of contents"></nav>

      <div class="contents-footer">
        <a href="../index.html">Legacy reader</a>
      </div>
    </aside>

    <main class="article-panel">
      <nav class="breadcrumbs" id="breadcrumbs" aria-label="Breadcrumb"></nav>

      <div class="article-and-outline">
        <article id="article" class="article" tabindex="-1">
          <div class="loading-state" id="loadingState">Loading article…</div>
          <div id="articleBody" class="article-body"></div>
          <nav class="page-nav" aria-label="Previous and next articles">
            <a id="previousPage" href="#"></a>
            <a id="nextPage" href="#"></a>
          </nav>
        </article>

        <aside class="outline" id="outline" aria-label="On this page" hidden>
          <h2>On this page</h2>
          <nav id="outlineLinks"></nav>
        </aside>
      </div>
    </main>
  </div>

  <iframe id="legacyFrame" class="legacy-frame" title="Legacy article loader" tabindex="-1"></iframe>

  <script src="app.js"></script>
  <script src="../contents_data.js"></script>
  <script>ManualReader.start();</script>

</html>
